<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;


/* ══════════ SENSOR LAYOUT ══════════
  [헤드레스트-등판 사이] VL53L8CX 1개 (8x8 ToF, 거북목 3D 측정)
    → neckDist: 거리(0=밀착,1=멀리), neckAngle: 좌우 기울기(-1~1)
  [등판 상단] MPU6050 1개 (의자 기울기 측정)
    → tiltX: 전후 기울기(-1=앞,+1=뒤), tiltY: 좌우 기울기(-1=왼,+1=오른)
  [등받이 3x4 행렬]
    Col1(압력)  Col2(VL53L0X)  Col3(압력)
    BL1         ToF1            BR1       ← Row1 (상부)
    BL2         ToF2            BR2       ← Row2
    BL3         ToF3            BR3       ← Row3
    BL4         ToF4            BR4       ← Row4 (하부/요추)
    → VL53L0X 4개: 허리 척추 굽힘만 측정
  [좌석 2x2]
    SBL(뒤왼)  SBR(뒤오른)
    SFL(앞왼)  SFR(앞오른)
  총: 압력 12개 + VL53L0X 4개 + VL53L8CX 1개 + MPU6050 1개
══════════════════════════════════════ */
const ZONES = [
  {id:"BL1",label:"등 좌상",part:"back",row:0,col:"L"},
  {id:"BL2",label:"등 좌중상",part:"back",row:1,col:"L"},
  {id:"BL3",label:"등 좌중하",part:"back",row:2,col:"L"},
  {id:"BL4",label:"등 좌하",part:"back",row:3,col:"L"},
  {id:"BR1",label:"등 우상",part:"back",row:0,col:"R"},
  {id:"BR2",label:"등 우중상",part:"back",row:1,col:"R"},
  {id:"BR3",label:"등 우중하",part:"back",row:2,col:"R"},
  {id:"BR4",label:"등 우하",part:"back",row:3,col:"R"},
  {id:"SBL",label:"좌석 뒤왼",part:"seat",row:0,col:"L"},
  {id:"SBR",label:"좌석 뒤오른",part:"seat",row:0,col:"R"},
  {id:"SFL",label:"좌석 앞왼",part:"seat",row:1,col:"L"},
  {id:"SFR",label:"좌석 앞오른",part:"seat",row:1,col:"R"},
];
const TOF_LABELS=["요추 ToF 1","요추 ToF 2","요추 ToF 3","요추 ToF 4"];
const POS={
  GOOD:{label:"정자세",color:"#16a34a"},
  TURTLE_NECK:{label:"거북목",color:"#9333ea"},
  LUMBAR_FWD:{label:"허리 굽힘",color:"#be185d"},
  LEAN_LEFT:{label:"왼쪽 기울임",color:"#dc2626"},
  LEAN_RIGHT:{label:"오른쪽 기울임",color:"#dc2626"},
  LEAN_FORWARD:{label:"앞으로 기울임",color:"#ea580c"},
  SLOUCH:{label:"구부정한 자세",color:"#ea580c"},
  CROSSED_LEFT:{label:"왼쪽 다리 꼬기",color:"#dc2626"},
  CROSSED_RIGHT:{label:"오른쪽 다리 꼬기",color:"#dc2626"},
  HALF_LYING:{label:"걸터앉아 반누움",color:"#0369a1"},
};
const WT={back:1.5,seat:1.0};
const lc=d=>d<.25?"#22c55e":d<.55?"#f59e0b":"#ef4444";
const sc=s=>s>=75?"#22c55e":s>=50?"#f59e0b":"#ef4444";
const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const topP=arr=>{if(!arr||!arr.length)return"GOOD";const f={};arr.forEach(x=>{if(x)f[x]=(f[x]||0)+1;});const e=Object.entries(f);return e.length?e.sort((a,b)=>b[1]-a[1])[0][0]:"GOOD";};
const avgOf=arr=>arr&&arr.length?arr.reduce((s,x)=>s+(x||0),0)/arr.length:0;
const fmtNum=n=>n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":String(n);
const safeFlat=blocks=>{if(!blocks||!Array.isArray(blocks))return[];const out=[];const walk=items=>{if(!items||!Array.isArray(items))return;for(const c of items){if(!c)continue;if(c.children&&Array.isArray(c.children))walk(c.children);else out.push(c);}};walk(blocks);return out;};
function postureStats(block){
  if(!block)return[];
  const flat=safeFlat(block.children?[block]:[]);
  if(!flat.length)return[];
  const f={};flat.forEach(m=>{if(m&&m.posture)m.posture.split("+").forEach(p=>{if(p&&p!=="GOOD")f[p]=(f[p]||0)+1;});});const total=flat.length;
  if(!Object.keys(f).length)return[{posture:"GOOD",count:total,pct:100}];
  return Object.entries(f).sort((a,b)=>b[1]-a[1]).map(([p,cnt])=>({posture:p,count:cnt,pct:total>0?Math.round(cnt/total*100):0}));
}
function detect(z,tof,neck,mpu){
  const L=[z[0],z[1],z[2],z[3]],R=[z[4],z[5],z[6],z[7]];
  const seat=[z[8],z[9],z[10],z[11]];
  const avgL=avgOf(L),avgR=avgOf(R),backDiff=avgL-avgR;
  const seatL=(seat[0]+seat[2])/2,seatR=(seat[1]+seat[3])/2,seatDiff=seatL-seatR;
  const seatFront=(seat[2]+seat[3])/2,seatBack=(seat[0]+seat[1])/2;
  const lmTof=avgOf(tof);const avgBack=avgOf([...L,...R]);
  const nd=neck?.dist||0;const yBias=mpu?.tiltY||0;
  const flags=[];
  if(avgBack>.6&&seatFront>seatBack+.08&&seatBack<.42&&lmTof>.3)flags.push("HALF_LYING");
  if(nd>.35)flags.push("TURTLE_NECK");
  if(lmTof>.4)flags.push("LUMBAR_FWD");
  if(lmTof>.35&&avgBack<.35)flags.push("SLOUCH");
  if(lmTof>.35&&seatFront>seatBack+.15&&avgBack<.4)flags.push("LEAN_FORWARD");
  if(backDiff+yBias*.1>.15&&seatDiff>.1)flags.push("LEAN_LEFT");
  if(backDiff+yBias*.1<-.15&&seatDiff<-.1)flags.push("LEAN_RIGHT");
  if(Math.abs(seatDiff)>.25)flags.push(seatDiff>0?"CROSSED_LEFT":"CROSSED_RIGHT");
  return flags.length>0?flags.join("+"):"GOOD";
}
function calcScore(z,tof,neck,mpu,cal,calTof,calNeck,calMpu,pen,sens){
  let tw=0,td=0;
  const devs=z.map((v,i)=>{const d=Math.abs(v-cal[i])*sens;const w=WT[ZONES[i].part];tw+=w;td+=d*w;return cl(d,0,1);});
  const tofDevs=tof.map((v,i)=>{const d=Math.abs(v-calTof[i])*sens;tw+=2.0;td+=d*2.0;return cl(d,0,1);});
  const neckDev=cl(Math.abs((neck?.dist||0)-(calNeck?.dist||0))*sens,0,1);
  tw+=2.5;td+=neckDev*2.5;
  const tiltDev=Math.abs((mpu?.tiltX||0)-(calMpu?.tiltX||0));
  const tiltPenalty=cl(tiltDev*.15,0,.1);
  const raw=cl((100*(1-(tw>0?td/tw:0)))/pen,0,100);
  return{score:cl(raw-tiltPenalty*100,0,100),devs,tofDevs,neckDev,tiltDev};
}
const DELTAS={
  TURTLE_NECK:{z:[-.15,-.1,0,0, -.15,-.1,0,0, 0,0,0,0],tof:[0,0,0,0],neck:{dist:.5,angle:0},mpu:{tiltX:0,tiltY:0}},
  LUMBAR_FWD:{z:[0,0,-.1,-.2, 0,0,-.1,-.2, 0,0,.05,.05],tof:[.4,.45,.5,.55],neck:{dist:.1,angle:0},mpu:{tiltX:0,tiltY:0}},
  LEAN_LEFT:{z:[.2,.22,.18,.15, -.2,-.22,-.18,-.15, .15,-.15,.1,-.2],tof:[.05,.08,.1,.07],neck:{dist:0,angle:-.3},mpu:{tiltX:0,tiltY:-.15}},
  LEAN_RIGHT:{z:[-.2,-.22,-.18,-.15, .2,.22,.18,.15, -.15,.15,-.2,.1],tof:[.05,.08,.1,.07],neck:{dist:0,angle:.3},mpu:{tiltX:0,tiltY:.15}},
  LEAN_FORWARD:{z:[-.2,-.22,-.25,-.28, -.2,-.22,-.25,-.28, -.15,-.15,.2,.22],tof:[.3,.4,.5,.55],neck:{dist:.2,angle:0},mpu:{tiltX:-.1,tiltY:0}},
  SLOUCH:{z:[-.1,-.15,-.2,-.25, -.1,-.15,-.2,-.25, 0,0,.05,.05],tof:[.1,.15,.4,.55],neck:{dist:.25,angle:0},mpu:{tiltX:-.05,tiltY:0}},
  CROSSED_LEFT:{z:[0,0,0,0, 0,0,0,0, .2,-.15,.25,-.25],tof:[.03,.05,.08,.05],neck:{dist:0,angle:0},mpu:{tiltX:0,tiltY:-.05}},
  CROSSED_RIGHT:{z:[0,0,0,0, 0,0,0,0, -.15,.2,-.25,.25],tof:[.03,.05,.08,.05],neck:{dist:0,angle:0},mpu:{tiltX:0,tiltY:.05}},
  HALF_LYING:{z:[.2,.25,.28,.3, .2,.25,.28,.3, -.15,-.15,.18,.2],tof:[-.05,-.02,.3,.4],neck:{dist:-.05,angle:0},mpu:{tiltX:.2,tiltY:0}},
};
function genSensorData(flags){
  const z=ZONES.map(()=>.5+(Math.random()-.5)*.04);
  const t=[.08,.08,.1,.12].map(v=>v+(Math.random()-.5)*.03);
  let neck={dist:.08+(Math.random()-.5)*.04,angle:(Math.random()-.5)*.05};
  let mpu={tiltX:(Math.random()-.5)*.03,tiltY:(Math.random()-.5)*.03};
  for(const flag of flags){const d=DELTAS[flag];if(!d)continue;
    for(let i=0;i<12;i++)z[i]+=d.z[i]||0;for(let i=0;i<4;i++)t[i]+=d.tof[i]||0;
    if(d.neck){neck.dist+=d.neck.dist||0;neck.angle+=d.neck.angle||0;}
    if(d.mpu){mpu.tiltX+=d.mpu.tiltX||0;mpu.tiltY+=d.mpu.tiltY||0;}}
  return{z:z.map(v=>cl(v+(Math.random()-.5)*.02,0,1)),tof:t.map(v=>cl(v+(Math.random()-.5)*.02,0,1)),
    neck:{dist:cl(neck.dist,0,1),angle:cl(neck.angle,-1,1)},mpu:{tiltX:cl(mpu.tiltX,-1,1),tiltY:cl(mpu.tiltY,-1,1)}};
}
const mkProf=i=>({slot:i,name:`프로필 ${i+1}`,calibration:null,calTof:null,calNeck:null,calMpu:null,sensitivity:1.0,alertDelay:60});
/* ═══ CHAIR TOP VIEW ═══ */
function ChairView({devs,tofDevs,neck,neckDev,mpu}){
  const c=i=>lc(devs[i]||0);
  const o=i=>cl(.5+(devs[i]||0)*.5,.5,1);
  const tc=i=>{const d=tofDevs?.[i]||0;return d<.25?"#22c55e":d<.55?"#f59e0b":"#ef4444";};
  const nd=neck?.dist||0,nc=lc(neckDev||0);
  return <svg viewBox="0 0 260 410" style={{width:"100%",maxWidth:250,display:"block",margin:"0 auto"}}>
    {/* VL53L8CX (헤드레스트-등판 사이) */}
    <rect x={70} y={2} width={120} height={28} rx={8} fill="none" stroke={nc} strokeWidth={2} strokeDasharray="5,3"/>
    <text x={130} y={14} textAnchor="middle" fontSize={7} fill={nc} fontWeight="600">VL53L8CX (거북목 3D)</text>
    <text x={130} y={24} textAnchor="middle" fontSize={8} fill={nc} fontWeight="700">{((1-nd)*100).toFixed(0)}%</text>
    {/* MPU6050 (등판 상단) */}
    <rect x={180} y={36} width={50} height={18} rx={5} fill="#0ea5e920" stroke="#0ea5e9" strokeWidth={1}/>
    <text x={205} y={48} textAnchor="middle" fontSize={6} fill="#0ea5e9" fontWeight="700">MPU {((mpu?.tiltX||0)*100).toFixed(0)}°</text>
    {/* 등받이 외곽 */}
    <rect x={25} y={34} width={210} height={195} rx={14} fill="#eaecef" stroke="#9ca3af" strokeWidth={1.5}/>
    <text x={85} y={49} textAnchor="middle" fontSize={9} fill="#9ca3af" fontWeight="600">등받이</text>
    {/* 3x4 grid */}
    {[0,1,2,3].map(row=>{
      const y=58+row*40;
      return <g key={row}>
        {/* Left pressure */}
        <rect x={35} y={y} width={55} height={35} rx={6} fill={c(row)} opacity={o(row)} stroke="#555" strokeWidth={1.2}/>
        <text x={62} y={y+20} textAnchor="middle" fontSize={7} fill="#fff" fontWeight="700">{ZONES[row].label.replace("등 ","")}</text>
        {/* ToF center */}
        <rect x={100} y={y} width={55} height={35} rx={6} fill="none" stroke={tc(row)} strokeWidth={2} strokeDasharray="4,3"/>
        <text x={128} y={y+15} textAnchor="middle" fontSize={7} fill={tc(row)} fontWeight="600">ToF</text>
        <text x={128} y={y+25} textAnchor="middle" fontSize={7} fill={tc(row)} fontWeight="700">{tofDevs?((1-tofDevs[row])*100).toFixed(0)+"%" :"—"}</text>
        {/* Right pressure */}
        <rect x={165} y={y} width={55} height={35} rx={6} fill={c(row+4)} opacity={o(row+4)} stroke="#555" strokeWidth={1.2}/>
        <text x={192} y={y+20} textAnchor="middle" fontSize={7} fill="#fff" fontWeight="700">{ZONES[row+4].label.replace("등 ","")}</text>
      </g>;
    })}
    {/* 좌석 외곽 */}
    <rect x={25} y={240} width={210} height={140} rx={14} fill="#eaecef" stroke="#9ca3af" strokeWidth={1.5}/>
    <text x={130} y={255} textAnchor="middle" fontSize={9} fill="#9ca3af" fontWeight="600">좌석</text>
    {/* 2x2 seat grid - centered */}
    {/* Back row: SBL(8), SBR(9) */}
    <rect x={35} y={263} width={91} height={50} rx={8} fill={c(8)} opacity={o(8)} stroke="#555" strokeWidth={1.2}/>
    <text x={80} y={292} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="700">뒤왼</text>
    <rect x={134} y={263} width={91} height={50} rx={8} fill={c(9)} opacity={o(9)} stroke="#555" strokeWidth={1.2}/>
    <text x={180} y={292} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="700">뒤오른</text>
    {/* Front row: SFL(10), SFR(11) */}
    <rect x={35} y={320} width={91} height={50} rx={8} fill={c(10)} opacity={o(10)} stroke="#555" strokeWidth={1.2}/>
    <text x={80} y={349} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="700">앞왼</text>
    <rect x={134} y={320} width={91} height={50} rx={8} fill={c(11)} opacity={o(11)} stroke="#555" strokeWidth={1.2}/>
    <text x={180} y={349} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="700">앞오른</text>
  </svg>;
}
/* ═══ SPINE SIDE VIEW ═══ */
function SpineView({tof,tofDevs,neck,neckDev,mpu}){
  const t=tof||[.08,.08,.1,.12]; // VL53L0X 4개 = 요추 전용
  const td=tofDevs||[0,0,0,0];
  const nd=neck?.dist||0;       // VL53L8CX = 거북목 거리
  const ndv=neckDev||0;         // 거북목 편차
  const lowerTof=avgOf(t);
  const tiltX=mpu?.tiltX||0;    // MPU6050 전후 기울기
  const segData=[];
  let segY=55;
  const segH=14;
  const baseX=135;
  // 경추 (3 segments) - VL53L8CX에 반응
  const neckFwd=nd*45;
  for(let i=0;i<3;i++){
    const fwd=neckFwd*(1-i*0.25);
    segData.push({x:baseX-fwd,y:segY,color:nd>.3?lc(ndv):"#a3a3a3",label:i===1?"경추":"",region:"경추",dev:nd>.25?ndv:null});
    segY+=segH;
  }
  // 흉추 (6 segments) - 요추 상위 ToF의 약한 영향 + MPU 기울기 반영
  for(let i=0;i<6;i++){
    const lumbarInfluence=t[0]*0.3;  // 상부 요추 ToF의 간접 영향
    const tiltInfluence=Math.max(0,-tiltX*15); // 앞으로 기울면 흉추도 앞으로
    const fwd=(lumbarInfluence+tiltInfluence*0.1)*(i/5)*30;
    const dev=td[0]*0.4;
    segData.push({x:baseX-fwd,y:segY,color:lumbarInfluence>.15?lc(dev):"#a3a3a3",label:i===2?"흉추":"",region:"흉추",dev:lumbarInfluence>.1?dev:null});
    segY+=segH;
  }
  // 요추 (5 segments) - VL53L0X 4개 직접 매핑
  for(let i=0;i<5;i++){
    const tIdx=Math.min(i,3);
    const fwd=t[tIdx]*40;
    const dev=td[tIdx];
    segData.push({x:baseX-fwd,y:segY,color:lc(dev),label:i===2?"요추":"",region:"요추",dev});
    segY+=segH;
  }
  // 천추 (2 segments)
  for(let i=0;i<2;i++){segData.push({x:baseX-t[3]*30,y:segY,color:"#a3a3a3",label:i===0?"천추":"",region:"천추"});segY+=segH;}
  const totalH=segY+10;
  const topSeg=segData[0];
  const topX=topSeg?topSeg.x:baseX;
  const topY=topSeg?topSeg.y:55;
  return <svg viewBox={`0 0 240 ${totalH}`} style={{width:"100%",maxWidth:230,display:"block",margin:"0 auto"}}>
    {/* Chair back only */}
    <rect x={150} y={48} width={18} height={220} rx={6} fill="#eaecef" stroke="#d1d5db" strokeWidth={1}/>
    {/* Spine vertebrae (경추가 곧 목 표현) */}
    {segData.map((seg,i)=>{
      const w=22,h=segH-3;
      const nextSeg=segData[i+1];
      return <g key={i}>
        <rect x={seg.x-w/2} y={seg.y} width={w} height={h} rx={4}
          fill={seg.color} opacity={seg.dev!=null?.85:.5} stroke="#555" strokeWidth={1}/>
        {nextSeg&&<line x1={seg.x} y1={seg.y+h} x2={nextSeg.x} y2={nextSeg.y}
          stroke="#888" strokeWidth={2} strokeLinecap="round"/>}
        {seg.label&&<>
          <line x1={seg.x-w/2-3} y1={seg.y+h/2} x2={20} y2={seg.y+h/2} stroke="#aaa" strokeWidth={.5} strokeDasharray="2,2"/>
          <text x={16} y={seg.y+h/2+3} textAnchor="end" fontSize={8} fill="#737373" fontWeight="600">{seg.label}</text>
        </>}
      </g>;
    })}
    {/* Body silhouette (starts from cervical top) */}
    <path d={`M${topX-10},${topY-2} Q${segData[3]?segData[3].x-16:110},${segData[3]?segData[3].y:90} ${segData[7]?segData[7].x-14:100},${segData[7]?segData[7].y:155}
      L${segData[13]?segData[13].x-8:95},${segData[13]?segData[13].y:230} L${segData[13]?segData[13].x+18:125},${segData[13]?segData[13].y:230}
      Q${segData[7]?segData[7].x+18:135},${segData[7]?segData[7].y:155} ${segData[3]?segData[3].x+16:145},${segData[3]?segData[3].y:90}
      L${topX+10},${topY-2} Z`}
      fill="#d4d4d4" opacity={.2}/>
    {/* ToF distance indicators */}
    {[0,1,2,3].map(i=>{
      const si=i===0?3:i===1?6:i===2?9:13;
      const seg=segData[si];if(!seg)return null;
      const gap=t[i]*40;
      if(gap<3)return null;
      return <g key={`tof${i}`}>
        <line x1={seg.x+12} y1={seg.y+5} x2={153} y2={seg.y+5} stroke={lc(td[i])} strokeWidth={1} strokeDasharray="3,2"/>
        <text x={156} y={seg.y+8} fontSize={7} fill={lc(td[i])} fontWeight="700">{(t[i]*100).toFixed(0)}%</text>
      </g>;
    })}
    {/* Turtle neck (VL53L8CX) */}
    {nd>.3&&<g>
      <line x1={topX-12} y1={topY+3} x2={topX-28} y2={topY-10} stroke="#9333ea" strokeWidth={1.5}/>
      <polygon points={`${topX-28},${topY-14} ${topX-32},${topY-6} ${topX-24},${topY-8}`} fill="#9333ea"/>
      <text x={topX-30} y={topY-16} textAnchor="middle" fontSize={8} fill="#9333ea" fontWeight="700">거북목</text>
    </g>}

/* ═══ PRESSURE SLIDER (swipe between views) ═══ */
function PressureSlider({devs,tofDevs,tof,neck,neckDev,mpu}){
  const [page,setPage]=useState(0);
  const startRef=useRef(null);
  const dxRef=useRef(0);
  const [dragging,setDrag]=useState(false);
  const [dOff,setDOff]=useState(0);
  const onS=useCallback(x=>{startRef.current=x;dxRef.current=0;setDrag(true);},[]);
  const onM=useCallback(x=>{if(startRef.current===null)return;let d=x-startRef.current;
    // clamp: page 0 cannot go right, page 1 cannot go left
    if(page===0&&d>0)d=0;
    if(page===1&&d<0)d=0;
    dxRef.current=d;setDOff(d);},[page]);
  const onE=useCallback(()=>{if(startRef.current===null)return;
    if(dxRef.current<-40&&page===0)setPage(1);else if(dxRef.current>40&&page===1)setPage(0);
    startRef.current=null;dxRef.current=0;setDrag(false);setDOff(0);},[page]);
  const labels=["좌석 압력 분포","측면 척추 분석"];
  return <div style={{overflow:"hidden",position:"relative"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
      <span style={{fontSize:11,color:"#6b7280",fontWeight:600}}>{labels[page]}</span>
      <div style={{display:"flex",gap:5}}>
        {[0,1].map(i=><div key={i} style={{width:i===page?16:6,height:6,borderRadius:3,background:i===page?"#2563eb":"#d1d5db",transition:"all .2s"}}/>)}
      </div></div>
    <div onTouchStart={e=>onS(e.touches[0].clientX)} onTouchMove={e=>onM(e.touches[0].clientX)} onTouchEnd={onE}
      onMouseDown={e=>{e.preventDefault();onS(e.clientX);
        const mm=ev=>onM(ev.clientX);const mu=()=>{onE();window.removeEventListener("mousemove",mm);window.removeEventListener("mouseup",mu);};
        window.addEventListener("mousemove",mm);window.addEventListener("mouseup",mu);}}
      style={{cursor:"grab",userSelect:"none",touchAction:"pan-y"}}>
      <div style={{display:"flex",width:"200%",transform:`translateX(calc(${-page*50}% + ${dragging?dOff:0}px))`,transition:dragging?"none":"transform .3s ease-out"}}>
        <div style={{width:"50%",flexShrink:0}}><ChairView devs={devs} tofDevs={tofDevs} neck={neck} neckDev={neckDev} mpu={mpu}/></div>
        <div style={{width:"50%",flexShrink:0}}><SpineView tof={tof} tofDevs={tofDevs} neck={neck} neckDev={neckDev} mpu={mpu}/></div>
      </div></div>
    <div style={{textAlign:"center",marginTop:4}}>
      <span style={{fontSize:9,color:"#c4c4c4"}}>{page===0?"← 밀어서 척추 분석":"밀어서 좌석 분포 →"}</span></div>
  </div>;
}

            <div key={label} style={{marginBottom:14}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><span>{icon}</span><span style={{fontSize:12,fontWeight:700,color}}>{label}</span></div>
              <div style={{fontSize:12,lineHeight:1.6,color:"#374151",paddingLeft:22}}>{text}</div></div>)}</Card>}
        {totalMin<3&&!aiResult&&<Card style={{textAlign:"center",padding:30}}><div style={{fontSize:28,marginBottom:8}}>🔬</div><div style={{fontSize:12,color:"#9ca3af"}}>최소 3분 이상의 데이터 필요</div></Card>}</>}
    </div>
    {firstEver&&connected&&<TutorialOverlay step={tutStep} onNext={tutDone} onCalibrate={()=>doCal(setTutCaling,setTutCaled,actProf)} calibrating={tutCaling} calibrated={tutCaled}/>}
    {showProf&&!firstEver&&<Sheet onClose={()=>{if(needsCal===null)setShowProf(false);}} closable={needsCal===null}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <span style={{fontSize:16,fontWeight:800}}>프로필 관리</span>
        {needsCal===null&&<button onClick={()=>setShowProf(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#9ca3af"}}>✕</button>}</div>
      {needsCal!==null?<div style={{border:"2px solid #2563eb",borderRadius:12,padding:16,background:"#f0f6ff"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:30,height:30,borderRadius:8,background:"#2563eb",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13}}>{needsCal+1}</div>
          <div style={{fontSize:14,fontWeight:700}}>{profiles[needsCal].name}</div></div>
        <CalStep onCalibrate={()=>doCal(setPCaling,setPCaled,needsCal)} calibrating={pCaling} calibrated={pCaled} onDone={profDone}/></div>
      :<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {profiles.map((p,i)=>{const act=i===actProf,hc=p.calibration!==null;
          return <div key={i} style={{border:act?"2px solid #2563eb":"1px solid #e5e7eb",borderRadius:12,padding:14,background:act?"#f0f6ff":"#fff"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:30,height:30,borderRadius:8,flexShrink:0,background:act?"#2563eb":"#d1d5db",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                <div style={{fontSize:10,color:"#9ca3af"}}>{hc?`민감도 ${p.sensitivity.toFixed(1)}x · 유예 ${p.alertDelay}초`:"미설정"}</div></div>
              {act?<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:"#dcfce7",color:"#16a34a",fontWeight:700,flexShrink:0}}>사용 중</span>
                :<button onClick={()=>switchProf(i)} style={{padding:"5px 12px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>적용</button>}</div>
            <div style={{display:"flex",gap:6,marginTop:10}}>
              <button onClick={()=>{setShowProf(false);setEditSlot(i);}} style={Bp}>편집</button>
              <button onClick={()=>{setNeedsCal(i);setPCaled(false);}} style={{...Bp,background:hc?"#f1f5f9":"#dbeafe",color:hc?"#374151":"#1d4ed8"}}>{hc?"재캘리브레이션":"캘리브레이션"}</button>
              <button onClick={()=>resetProf(i)} style={{...Bp,background:"#fef2f2",color:"#ef4444"}}>초기화</button></div></div>;})}</div>}
    </Sheet>}
    {detailPopup&&<DetailPopup block={detailPopup} onClose={()=>setDetailPopup(null)} unitLabel={detailUnit}/>}
    {breakdownPopup&&<PostureBreakdownPopup stats={breakdownPopup.stats} label={breakdownPopup.label} onClose={()=>setBreakdownPopup(null)}/>}
    {editSlot!==null&&<EditDialog profile={profiles[editSlot]} onCancel={()=>setEditSlot(null)} onSave={u=>{setProfiles(p=>{const n=[...p];n[editSlot]=u;return n;});setEditSlot(null);}}/>}
    <div style={{display:"flex",borderTop:"1px solid #e5e7eb",background:"#fff",paddingBottom:"env(safe-area-inset-bottom,0)",flexShrink:0}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t.id?"#2563eb":"#9ca3af",fontWeight:tab===t.id?700:400,fontSize:10}}><span style={{fontSize:18}}>{t.icon}</span>{t.label}</button>)}</div>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}`}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
